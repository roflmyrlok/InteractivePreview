# docker-compose.swagger-test.yml
# ──────────────────────────────────────────────────────────────────
# Full-stack Swagger integration test.
#
# Spins up postgres + all three services in Development mode so
# that the Swagger UI and /swagger/v1/swagger.json are enabled.
# The ci-local.sh --swagger phase uses this compose file to:
#   1. Start the stack
#   2. Wait for each /swagger/v1/swagger.json endpoint to return 200
#   3. Print the Swagger URLs for manual inspection
#   4. Tear down automatically
#
# Requires a .env file in this directory (copy from .env.example).
# ──────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_ci}
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ci-network

  userservice:
    build:
      context: ../backend/UserService
      dockerfile: Dockerfile
      target: final
    ports:
      - "127.0.0.1:${USERSERVICE_HTTP_PORT:-5280}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development        # required for Swagger UI
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-microservices};
        Username=${POSTGRES_USER:-postgres};
        Password=${POSTGRES_PASSWORD:-postgres_ci}
      Jwt__Key: ${JWT_KEY:-CILocalTestKeyAtLeast32CharsLong!}
      Jwt__Issuer: ${JWT_ISSUER:-MicroservicesApp}
      Jwt__Audience: ${JWT_AUDIENCE:-MicroservicesClient}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/swagger/v1/swagger.json > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-network

  locationservice:
    build:
      context: ../backend/LocationService
      dockerfile: Dockerfile
      target: final
    ports:
      - "127.0.0.1:${LOCATIONSERVICE_HTTP_PORT:-5282}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-microservices};
        Username=${POSTGRES_USER:-postgres};
        Password=${POSTGRES_PASSWORD:-postgres_ci}
      Jwt__Key: ${JWT_KEY:-CILocalTestKeyAtLeast32CharsLong!}
      Jwt__Issuer: ${JWT_ISSUER:-MicroservicesApp}
      Jwt__Audience: ${JWT_AUDIENCE:-MicroservicesClient}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/swagger/v1/swagger.json > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-network

  reviewservice:
    build:
      context: ../backend/ReviewService
      dockerfile: Dockerfile
      target: final
    ports:
      - "127.0.0.1:${REVIEWSERVICE_HTTP_PORT:-5284}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development        # was Production in docker-compose.yml; must be Development for Swagger
      ASPNETCORE_HTTP_PORTS: 8080
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-microservices};
        Username=${POSTGRES_USER:-postgres};
        Password=${POSTGRES_PASSWORD:-postgres_ci}
      Jwt__Key: ${JWT_KEY:-CILocalTestKeyAtLeast32CharsLong!}
      Jwt__Issuer: ${JWT_ISSUER:-MicroservicesApp}
      Jwt__Audience: ${JWT_AUDIENCE:-MicroservicesClient}
      Services__LocationService__BaseUrl: http://locationservice:8080
      # Stub AWS values so startup doesn't throw; S3 upload won't work in CI
      S3__AccessKey: ci-stub
      S3__SecretKey: ci-stub
      S3__BucketName: ci-bucket
      S3__Region: eu-central-1
      S3__BaseUrl: http://localhost
      S3__MaxFileSizeInMB: 5
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/swagger/v1/swagger.json > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge
