name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push UserService
        run: |
          docker build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/userservice:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/userservice:latest \
            ./backend/UserService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/userservice:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/userservice:latest

      - name: Build and push LocationService
        run: |
          docker build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/locationservice:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/locationservice:latest \
            ./backend/LocationService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/locationservice:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/locationservice:latest

      - name: Build and push ReviewService
        run: |
          docker build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:latest \
            ./backend/ReviewService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:latest

      - name: Pull and restart all services
        run: |
          cd ci-cd
          docker compose pull
          docker compose up -d --force-recreate
